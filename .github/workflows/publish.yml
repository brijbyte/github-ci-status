name: Publish Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    name: Publish to Visual Studio Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Read package version
        id: package
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const currentPackage = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const output = fs.createWriteStream(process.env.GITHUB_OUTPUT, { flags: 'a' });

          output.write(`name=${currentPackage.name}\n`);
          output.write(`publisher=${currentPackage.publisher}\n`);
          output.write(`version=${currentPackage.version}\n`);
          NODE

      - name: Check Marketplace version
        id: marketplace
        env:
          EXTENSION_NAME: ${{ steps.package.outputs.name }}
          EXTENSION_PUBLISHER: ${{ steps.package.outputs.publisher }}
          EXTENSION_VERSION: ${{ steps.package.outputs.version }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const extensionId = `${process.env.EXTENSION_PUBLISHER}.${process.env.EXTENSION_NAME}`;
          const response = await fetch(
            'https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery?api-version=7.2-preview.1',
            {
              method: 'POST',
              headers: {
                Accept: 'application/json',
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                filters: [
                  {
                    criteria: [
                      {
                        filterType: 7,
                        value: extensionId,
                      },
                    ],
                  },
                ],
                flags: 1,
              }),
            },
          );

          if (!response.ok) {
            throw new Error(
              `Marketplace lookup failed with ${response.status} ${response.statusText}`,
            );
          }

          const body = await response.json();
          const extension = body.results?.[0]?.extensions?.[0];
          const versions = Array.isArray(extension?.versions) ? extension.versions : [];
          const versionExists = versions.some(
            (version) => version.version === process.env.EXTENSION_VERSION,
          );
          const output = fs.createWriteStream(process.env.GITHUB_OUTPUT, { flags: 'a' });

          output.write(`version_exists=${versionExists ? 'true' : 'false'}\n`);
          console.log(
            versionExists
              ? `${extensionId}@${process.env.EXTENSION_VERSION} already exists.`
              : `${extensionId}@${process.env.EXTENSION_VERSION} is not on the Marketplace yet.`,
          );
          NODE

      - name: Check existing tag
        id: tag
        env:
          EXTENSION_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if git tag -l "v${EXTENSION_VERSION}" | grep -q .; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${EXTENSION_VERSION} already exists; a previous run already published (or queued) this version."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "No tag for v${EXTENSION_VERSION} yet."
          fi

      - name: Decide whether to publish
        id: decide
        env:
          VERSION_EXISTS: ${{ steps.marketplace.outputs.version_exists }}
          TAG_EXISTS: ${{ steps.tag.outputs.tag_exists }}
        run: |
          if [ "$VERSION_EXISTS" = "false" ] && [ "$TAG_EXISTS" = "false" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.decide.outputs.should_publish == 'true'
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        if: steps.decide.outputs.should_publish == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.decide.outputs.should_publish == 'true'
        run: pnpm install --frozen-lockfile

      - name: Validate
        if: steps.decide.outputs.should_publish == 'true'
        run: |
          pnpm run prettier
          pnpm run lint
          pnpm run typescript
          pnpm run test
          pnpm run package

      - name: Publish
        if: steps.decide.outputs.should_publish == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set +e
          output=$(pnpm run publish 2>&1)
          code=$?
          echo "$output"
          if [ $code -ne 0 ]; then
            if echo "$output" | grep -qi "already exists"; then
              echo "Version already exists on the Marketplace (likely queued by a previous run); treating as success."
              exit 0
            fi
            exit $code
          fi

      - name: Tag release
        if: steps.decide.outputs.should_publish == 'true'
        env:
          EXTENSION_VERSION: ${{ steps.package.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${EXTENSION_VERSION}"
          git push origin "v${EXTENSION_VERSION}"

      - name: Skip publish
        if: steps.decide.outputs.should_publish == 'false'
        env:
          EXTENSION_VERSION: ${{ steps.package.outputs.version }}
        run: |
          echo "Skipping publish."
          echo "version=${EXTENSION_VERSION} already published or queued (marketplace=${{ steps.marketplace.outputs.version_exists }}, tag=${{ steps.tag.outputs.tag_exists }})."
